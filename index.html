<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا الرائعة ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="envelope">
            <h2>LOVE<br>إلى نصفي الآخر ❤️</h2>
            <input type="password" id="password" placeholder="أدخل كلمة السر السحرية">
            <button onclick="checkPassword()">افتح القفل 🔓</button>
            <p id="error-msg" style="color: red; display: none;">كلمة السر غير صحيحة يا جميل!</p>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        
        <div class="music-player">
            <audio id="bg-music" controls loop>
                <source src="your-song.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="counter-section">
            <h3>سوا من يوم: <br> 18-02-2026</h3>
            <div id="time-counter">
                <span id="days">0</span> يوم
                <span id="hours">0</span> ساعة
                <span id="minutes">0</span> دقيقة
            </div>
            <p>كل ثانية بتعدي وأنتِ في قلبي وعقلي لحن لا ينتهي ❤️</p>
        </div>

        <div class="gallery">
            <div class="photo-card">
                <img src="photo1.jpg" alt="ذكرياتنا الجميلة">
                <p>أجمل يوم في حياتي لما بقينا سوا 🥰</p>
            </div>
            <div class="photo-card">
                <img src="photo2.jpg" alt="ذكرياتنا الجميلة">
                <p>ربنا يخليكي ليا وتفضلي دايماً منورة دنيتي 🌹</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
