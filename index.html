<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة خاصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            font-family: 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        /* شاشة القفل الأنيقة */
        #login-box {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
            border: 1px solid #fff;
            transition: all 0.5s ease;
        }
        #login-box h2 {
            color: #d90429;
            margin-bottom: 25px;
            font-size: 24px;
        }
        input {
            padding: 15px;
            width: 100%;
            border: 2px solid #ffccd5;
            border-radius: 50px;
            font-size: 18px;
            outline: none;
            text-align: center;
            transition: 0.3s;
            margin-bottom: 20px;
            background: #fff9fa;
        }
        input:focus {
            border-color: #ff4d6d;
            box-shadow: 0 0 10px rgba(255, 77, 109, 0.2);
        }
        button {
            padding: 15px 40px;
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(45deg, #e63956, #d90429);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }
        #error-msg {
            color: #d90429;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            font-size: 16px;
        }
        /* المحتوى المخفي */
        #content {
            display: none;
            width: 100%;
            max-width: 600px;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #content h1 {
            color: #8b0000;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .image-container {
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 20px;
        }
        .audio-box {
            margin: 30px 0;
            background: white;
            padding: 20px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
        }
        audio {
            width: 90%;
            outline: none;
        }
        .counter-box {
            background: linear-gradient(45deg, #ffffff, #fff0f5);
            display: inline-block;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            color: #d90429;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.15);
            border: 2px solid #ffccd5;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .footer-text {
            margin-top: 40px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="login-box">
        <h2>دخلي عيد ميلادك ياكل حياتي♥️ 🔒</h2>
        <input type="password" id="passInput" placeholder="اكتب كلمة السر هنا">
        <br>
        <button onclick="checkPassword()">فتح المفاجأة ❤️</button>
        <div id="error-msg">كلمة السر غير صحيحة، حاول مجدداً ❌</div>
    </div>

    <div id="content">
        <h1>أجمل اللحظات بتكون معاكي انتي♥️ ✨</h1>
        
        <div class="image-container">
            <img src="photo1.jpg" alt="الذكريات الأولى">
        </div>
        
        <div class="image-container">
            <img src="photo2.jpg" alt="الذكريات الثانية">
        </div>

        <div class="audio-box">
            <audio id="song" controls>
                <source src="your-song.mp3" type="audio/mpeg">
                متصفحك لا يدعم تشغيل الصوت.
            </audio>
        </div>

        <div class="counter-box">
            ⏳ مـعـاً مـنـذ : <span id="days">0</span>  يـوم ولاخر العمر
        </div>

        <div class="footer-text">صُنع بكل الحب 🤍</div>
    </div>

    <script>
        function checkPassword() {
            let password = document.getElementById("passInput").value;
            // كلمة السر مضبوطة على كلمة "247" بأي حالة (سواء كابيتال أو سمول)
            if (password.toLowerCase() === "247") {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("content").style.display = "block";
                
                // تشغيل الأغنية فوراً بعد فتح القفل
                let audio = document.getElementById("song");
                audio.play().catch(e => {
                    console.log("المتصفح يمنع التشغيل التلقائي، يحتاج لتفاعل.");
                });
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        // خدعة لتشغيل الصوت عند أول لمسة للشاشة في حال المتصفح حظر التشغيل التلقائي
        document.body.addEventListener('click', function() {
            let audio = document.getElementById("song");
            let contentDisplay = document.getElementById("content").style.display;
            if (audio.paused && contentDisplay === "block") {
                audio.play().catch(e => console.log(e));
            }
        }, { once: true });

        // حساب الأيام التلقائي (تاريخ البداية: 18 فبراير 2026)
        let startDate = new Date("2026-02-18").getTime();
        let now = new Date().getTime();
        let diff = now - startDate;
        let daysPassed = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        document.getElementById("days").innerText = daysPassed >= 0 ? daysPassed : 0;
    </script>

</body>
</html>
